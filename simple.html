<style>

  h1{font-size:20px; margin:0 0 4px;}
  .sub{color:var(--muted); font-size:13px; margin-bottom:16px;}

  .readout{
    display:flex; flex-wrap:wrap; gap:18px; align-items:baseline;
  }
  .readout .date{font-size:22px; font-weight:700;}
  .readout .metric{font-size:13px; color:var(--muted);}
  .readout .metric b{color:var(--text); font-size:15px; font-weight:600;}
  .charts-row{display:flex; gap:14px; flex-wrap:wrap;}
  .charts-row .panel{flex:1 1 420px; margin-bottom:0;}
  .chart-box{position:relative; height:320px;}
  .panel-title{font-size:12px; color:var(--muted); margin:0 0 8px; text-transform:uppercase; letter-spacing:0.04em;}
  .controls{display:flex; flex-wrap:wrap; gap:16px; align-items:center;}
  .ctrl-group{display:flex; align-items:center; gap:8px; font-size:13px; color:var(--muted);}

  button{

    padding:8px 16px; font-size:13px; cursor:pointer; font-weight:600;
  }

  button.secondary{background:#333846;}
  .hint{font-size:12px; color:var(--muted); margin-top:10px;}
  @media (max-width: 860px){

  }
</style>
</head>

<div class="wrap">

  <div class="sub">日本の国債利回り曲線と日経平均株価の推移を連動表示します(2007年1月〜)。右のグラフをクリック/ドラッグするか、再生ボタンで自動再生できます。</div>

    <div class="date" id="dateLabel">-</div>

  </div>

  <div class="charts-row">
    <div class="panel">
      <div class="panel-title">利回り曲線</div>
      <div class="chart-box"><canvas id="curveChart"></canvas></div>
    </div>
    <div class="panel">
      <div class="panel-title">日経平均株価</div>
      <div class="chart-box"><canvas id="priceChart"></canvas></div>
    </div>
  </div>

  <div class="panel">
    <div class="controls">
      <button id="playBtn">▶ 再生</button>
      <button class="secondary" id="resetBtn">最初に戻る</button>
      <div class="ctrl-group">
        推移期間(トレイル):
        <input type="range" id="trailSlider" min="0" max="250" value="20">
        <span id="trailVal">20 日</span>
      </div>
      <div class="ctrl-group">
        再生速度:
        <input type="range" id="speedSlider" min="1" max="20" value="4">
        <span id="speedVal">4 日/コマ</span>
      </div>
    </div>
    <div class="hint">日経平均株価グラフ上でクリックまたはドラッグすると、その日付時点の利回り曲線が表示されます。</div>
  </div>
</div>

.96],["2026-06-23",1.17,1.426,1.957,2.683,3.554,3.79,69788.38],["2026-06-24",1.172,1.432,1.95,2.674,3.552,3.808,69174.97],["2026-06-25",1.175,1.421,1.923,2.637,3.526,3.781,72366.34],["2026-06-26",1.175,1.409,1.915,2.611,3.506,3.759,69360.88],["2026-06-29",1.173,1.411,1.916,2.644,3.54,3.785,69468.11],["2026-06-30",1.165,1.382,1.937,2.69,3.625,3.873,70062.32]]; // [dateISO, y1,y2,y5,y10,y20,y30, nikkei]
const MATURITY_LABELS = ['1年','2年','5年','10年','20年','30年'];
const N = RAW.length;
const Y_MIN = -0.6, Y_MAX = 4.3;

const dates = RAW.map(r=>r[0]);
const nikkei = RAW.map(r=>r[7]);

let curIdx = N - 1;
let trail = 20;
let playSpeed = 4;
let playing = false;
let playTimer = null;

function fmtDateJP(iso){
  const [y,m,d] = iso.split('-');
  return `${y}年${parseInt(m)}月${parseInt(d)}日`;
}

const ctxCurve = document.getElementById('curveChart').getContext('2d');
const ctxPrice = document.getElementById('priceChart').getContext('2d');

function trailColor(i, total){
  const t = total <= 1 ? 0 : i/total;
  const alpha = 1 - t*0.88;
  return `rgba(230,57,70,${alpha.toFixed(3)})`;
}

// Draws a bold, clearly-labeled line at y=0 on top of the plot area.
const zeroLinePlugin = {
  id: 'zeroLine',
  afterDraw(chart){
    const yScale = chart.scales.y;
    if(!yScale) return;
    if(yScale.min > 0 || yScale.max < 0) return;
    const ctx = chart.ctx;
    const yPix = yScale.getPixelForValue(0);
    const left = chart.chartArea.left, right = chart.chartArea.right;
    ctx.save();
    ctx.strokeStyle = '#7a8290';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([]);
    ctx.beginPath();
    ctx.moveTo(left, yPix);
    ctx.lineTo(right, yPix);
    ctx.stroke();
    ctx.fillStyle = '#aeb4bd';
    ctx.font = '11px sans-serif';
    ctx.textBaseline = 'bottom';
    ctx.fillText('0%', left + 2, yPix - 2);
    ctx.restore();
  }
};

const curveChart = new Chart(ctxCurve, {
  type:'line',
  data:{ labels: MATURITY_LABELS, datasets: [] },
  plugins:[zeroLinePlugin],
  options:{
    responsive:true, maintainAspectRatio:false,
    animation:false,
    interaction:{mode:'nearest', intersect:false},
    plugins:{ legend:{display:false}, tooltip:{callbacks:{label:(c)=>`${c.dataset.label||''}: ${c.parsed.y.toFixed(3)}%`}} },
    scales:{
      x:{ title:{display:true, text:'残存期間', color:'#9aa2af'}, grid:{color:'#262b35'}, ticks:{color:'#c7ccd4'} },
      y:{
        min: Y_MIN, max: Y_MAX,
        title:{display:true, text:'利回り (%)', color:'#9aa2af'},
        grid:{color:(ctx)=> ctx.tick && ctx.tick.value===0 ? '#7a8290' : '#262b35'},
        ticks:{color:'#c7ccd4', stepSize:0.5}
      }
    }
  }
});

const priceChart = new Chart(ctxPrice, {
  type:'line',
  data:{
    labels: dates,
    datasets:[
      {
        label:'日経平均株価', data: nikkei, borderColor:'#4ea1ff', backgroundColor:'transparent',
        borderWidth:1.4, pointRadius:0, tension:0, order:2
      },
      {
        label:'選択日', data: dates.map((d,i)=> i===curIdx ? nikkei[i] : null),
        borderColor:'#e63946', backgroundColor:'#e63946', pointRadius:5, pointHoverRadius:6,
        showLine:false, order:1
      }
    ]
  },
  options:{
    responsive:true, maintainAspectRatio:false, animation:false,
    plugins:{
      legend:{display:false},
      tooltip:{ callbacks:{ title:(items)=> fmtDateJP(dates[items[0].dataIndex]), label:(c)=> c.datasetIndex===0 ? `日経平均: ${c.parsed.y.toLocaleString()}` : null } }
    },
    scales:{
      x:{ ticks:{ color:'#c7ccd4', maxTicksLimit:8, autoSkip:true }, grid:{display:false} },
      y:{ ticks:{color:'#c7ccd4'}, grid:{color:'#262b35'} }
    },
    onClick:(evt)=>{
      const points = priceChart.getElementsAtEventForMode(evt, 'index', {intersect:false}, true);
      if(points.length){ setIndex(points[0].index); }
    }
  }
});

let dragging = false;
document.getElementById('priceChart').addEventListener('mousedown', ()=> dragging = true);
window.addEventListener('mouseup', ()=> dragging = false);
document.getElementById('priceChart').addEventListener('mousemove', (evt)=>{
  if(!dragging) return;
  const points = priceChart.getElementsAtEventForMode(evt, 'index', {intersect:false}, true);
  if(points.length){ setIndex(points[0].index); }
});

function buildCurveDatasets(idx, trailN){
  const datasets = [];
  const steps = Math.min(trailN, idx);
  for(let i=steps; i>=1; i--){
    const rowIdx = idx - i;
    const row = RAW[rowIdx];
    datasets.push({
      label: fmtDateJP(row[0]),
      data: [row[1],row[2],row[3],row[4],row[5],row[6]],
      borderColor: trailColor(i, steps),
      backgroundColor:'transparent',
      borderWidth:1, pointRadius:0, tension:0.15
    });
  }
  const cur = RAW[idx];
  datasets.push({
    label: fmtDateJP(cur[0]) + ' (選択日)',
    data:[cur[1],cur[2],cur[3],cur[4],cur[5],cur[6]],
    borderColor:'#e63946', backgroundColor:'rgba(230,57,70,0.08)',
    borderWidth:3, pointRadius:3, pointBackgroundColor:'#e63946', tension:0.15, fill:false
  });
  return datasets;
}

function setIndex(idx){
  curIdx = Math.max(0, Math.min(N-1, idx));
  const row = RAW[curIdx];
  document.getElementById('dateLabel').textContent = fmtDateJP(row[0]);
  document.getElementById('nikkeiLabel').textContent = row[7].toLocaleString() + ' 円';
  document.getElementById('y10Label').textContent = row[4].toFixed(3) + ' %';

  curveChart.data.datasets = buildCurveDatasets(curIdx, trail);
  curveChart.update();

  priceChart.data.datasets[1].data = dates.map((d,i)=> i===curIdx ? nikkei[i] : null);
  priceChart.update('none');
}

document.getElementById('trailSlider').addEventListener('input', (e)=>{
  trail = parseInt(e.target.value);
  document.getElementById('trailVal').textContent = trail + ' 日';
  setIndex(curIdx);
});
document.getElementById('speedSlider').addEventListener('input', (e)=>{
  playSpeed = parseInt(e.target.value);
  document.getElementById('speedVal').textContent = playSpeed + ' 日/コマ';
});

document.getElementById('resetBtn').addEventListener('click', ()=>{
  stopPlay();
  setIndex(0);
});

function stopPlay(){
  playing = false;
  clearInterval(playTimer);
  document.getElementById('playBtn').textContent = '▶ 再生';
}

document.getElementById('playBtn').addEventListener('click', ()=>{
  if(playing){ stopPlay(); return; }
  playing = true;
  document.getElementById('playBtn').textContent = '⏸ 停止';
  if(curIdx >= N-1) setIndex(0);
  playTimer = setInterval(()=>{
    if(curIdx >= N-1){ stopPlay(); return; }
    setIndex(curIdx + playSpeed);
  }, 90);
});

setIndex(N-1);
</script>
